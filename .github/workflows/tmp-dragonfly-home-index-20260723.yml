name: Temporary Dragonfly homepage website checks 2026-07-23

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install check dependencies
        run: python -m pip install --disable-pip-version-check requests
      - name: Check portfolio website redirects
        run: python scripts/tmp_dragonfly_home_http_checks_20260723.py
      - name: Upload website-check evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dragonfly-home-http-checks-20260723
          path: artifact-http
          if-no-files-found: warn
          retention-days: 30
