name: Temporary Dragonfly homepage index discovery 2026-07-23

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  discover:
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - name: Install discovery dependencies
        run: |
          python -m pip install --disable-pip-version-check requests beautifulsoup4 lxml playwright
          python -m playwright install --with-deps chromium
      - name: Run evidence-first discovery
        run: python scripts/tmp_dragonfly_home_discovery_20260723.py
      - name: Upload discovery evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dragonfly-home-index-discovery-20260723
          path: artifact
          if-no-files-found: warn
          retention-days: 30
