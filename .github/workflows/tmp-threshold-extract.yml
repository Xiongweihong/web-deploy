name: Temporary Threshold portfolio extraction

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  extract:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install browser dependencies
        run: |
          python -m pip install --disable-pip-version-check playwright requests beautifulsoup4 lxml
          python -m playwright install --with-deps chromium
      - name: Run evidence-first discovery and extraction
        run: python scripts/temporary_threshold_extraction.py
      - name: Upload extraction evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: threshold-portfolio-evidence
          path: artifact
          if-no-files-found: warn
          retention-days: 30
