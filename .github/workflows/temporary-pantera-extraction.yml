name: Temporary Pantera careers company extraction

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  extract:
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - name: Install extraction dependencies
        run: |
          python -m pip install --disable-pip-version-check requests playwright
          python -m playwright install --with-deps chromium
      - name: Prepare evidence-first extractor
        run: |
          python - <<'PY'
          from pathlib import Path
          import urllib.request

          url = "https://raw.githubusercontent.com/Xiongweihong/web-deploy/330db598412f3d10f5d1495977ac59088db96447/scripts/temporary_paradigm_extraction.py"
          text = urllib.request.urlopen(url, timeout=60).read().decode("utf-8")
          replacements = {
              'https://www.paradigm.xyz/careers': 'https://jobs.panteracapital.com/jobs',
              'https://jobs.paradigm.xyz/companies': 'https://jobs.panteracapital.com/companies',
              'https://jobs.paradigm.xyz/jobs': 'https://jobs.panteracapital.com/jobs',
              'paradigm-evidence-crawler': 'pantera-evidence-crawler',
              'paradigm-careers-companies': 'pantera-careers-companies',
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f"expected token missing: {old}")
              text = text.replace(old, new)
          Path('/tmp/temporary_pantera_extraction.py').write_text(text, encoding='utf-8')
          PY
      - name: Run evidence-first extraction
        run: python /tmp/temporary_pantera_extraction.py
      - name: Upload extraction evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pantera-careers-companies-evidence
          path: artifact
          if-no-files-found: warn
          retention-days: 30
