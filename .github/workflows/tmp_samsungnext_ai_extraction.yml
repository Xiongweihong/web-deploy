name: Temporary Samsung Next AI portfolio extraction

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  extract:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install logo evidence dependencies
        run: python -m pip install --disable-pip-version-check requests beautifulsoup4 lxml pillow
      - name: Generate logo evidence sheets
        run: python scripts/temporary_samsungnext_logo_sheet.py
      - name: Upload extraction evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: samsungnext-ai-logo-evidence
          path: artifact
          if-no-files-found: warn
          retention-days: 30
