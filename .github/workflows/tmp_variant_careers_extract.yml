name: Temporary Variant careers company extraction

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  extract:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install extraction dependencies
        run: python -m pip install --disable-pip-version-check requests
      - name: Run evidence-first extraction
        run: python scripts/temporary_variant_extraction.py
      - name: Upload extraction evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: variant-careers-companies-evidence
          path: artifact
          if-no-files-found: warn
          retention-days: 30
