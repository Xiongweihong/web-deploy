name: Temporary Founders Fund portfolio extraction

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  extract:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install parser dependencies
        run: python -m pip install --disable-pip-version-check requests beautifulsoup4 lxml
      - name: Run evidence-first extraction
        run: python scripts/temporary_foundersfund_extraction_fast.py
      - name: Upload extraction evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: foundersfund-portfolio-evidence-fast
          path: artifact
          if-no-files-found: warn
          retention-days: 30
