name: Temporary Magarac portfolio extraction

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  extract:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Install extraction dependencies
        run: |
          python -m pip install --disable-pip-version-check requests beautifulsoup4 lxml playwright
          python -m playwright install --with-deps chromium
      - name: Run evidence-first extraction
        run: python scripts/temporary_magarac_extraction.py
      - name: Inspect rendered tab visibility
        run: python scripts/temporary_magarac_render.py
      - name: Upload extraction evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: magarac-portfolio-evidence
          path: artifact
          if-no-files-found: warn
          retention-days: 30
